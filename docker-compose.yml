services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_TIMEOUT_S: ${OLLAMA_TIMEOUT_S:-600}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "until OLLAMA_HOST=http://ollama:11434 ollama list >/dev/null 2>&1; do sleep 2; done; OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen3:8b}"
    volumes:
      - ollama:/root/.ollama
    depends_on:
      - ollama
    restart: "no"

volumes:
  ollama:
