<!DOCTYPE html>
<html lang="et">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krünter</title>

  <script type="module" src="src/main.js"></script>
</head>

<body>
  <main class="app-shell">
    <section id="map" aria-label="Kinnistute kaart"></section>

    <form id="search-bar" class="search-card" role="search" autocomplete="off">
      <label id="search-header" for="search-input">Aadress või katastritunnus</label>
      <div class="search-row">
        <input id="search-input" type="text" value="P. Kerese tn 5a" autocomplete="off" autocapitalize="off"
          spellcheck="false" aria-autocomplete="list" aria-controls="search-suggestions">
        <button id="search-button" class="primary-button" type="submit">Otsi</button>
      </div>
      <div id="search-suggestions" class="search-suggestions" role="listbox" hidden></div>
    </form>

    <aside id="results-panel" class="results-drawer" aria-live="polite" aria-label="Kinnistu andmed">
      <div class="empty-panel">
        <p class="eyebrow">Kinnistu ülevaade</p>
        <h1>Vali kinnistu kaardilt või otsi aadressi järgi.</h1>
        <p class="muted">Tulemused kuvatakse siin koondatud planeeringu-, riski-, keskkonna- ja teenuste vaadetena.</p>
      </div>
    </aside>
  </main>
</body>

</html>
